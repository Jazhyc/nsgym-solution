# ── CartPole config ──────────────────────────────────────────────────────────
defaults:
  - agent: ppo
  - env: cartpole
  - _self_               # values below override the defaults above

hydra:
  run:
    dir: logs/runs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: logs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

# ── Data collection ─────────────────────────────────────────────────────────
collector:
  num_envs: 24
  num_groups: 2
  total_frames: 10_000_000   # converges quickly
  frames_per_batch: 2560
  max_frames_per_traj: 500  # CartPole-v1 episode cap

# ── CPU threading ────────────────────────────────────────────────────────────
num_threads: 4

# ── Training loop ────────────────────────────────────────────────────────────
training:
  num_epochs: 10
  sub_batch_size: 256
  max_grad_norm: 0.2
  target_kl: 0.02
  eval_ratio: 0.2            # evaluate every X% of total training frames (0.2 = every 20%)
  eval_rollout_steps: 500
  num_eval_episodes: 12        # max parallel eval envs per shard
  save_interval: 10000
  checkpoint_dir: checkpoints/cartpole

# ── Reproducibility ──────────────────────────────────────────────────────────
seed: 42

# ── Device ───────────────────────────────────────────────────────────────────
device: cpu

# ── Agent overrides (on top of agent/ppo.yaml) ───────────────────────────────
# CartPole is simple enough that a smaller network trains faster.
agent:
  hidden_sizes: [64, 64]
  entropy_coeff: 0.0

# ── Weights & Biases ─────────────────────────────────────────────────────────
wandb:
  enabled: true
  project: aamas-ppo-cartpole
  entity: null
  group: null
  name: null
  tags: [cartpole]
  mode: online
  dir: logs/wandb
