# ── Top-level Hydra config ──────────────────────────────────────────────
defaults:
  - agent: ppo
  - env: ant
  - _self_

hydra:
  run:
    dir: logs/runs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: logs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

# ── Data collection ────────────────────────────────────────────────────
collector:
  num_envs: 8                 # number of parallel environments
  total_frames: 100_000       # total frames to collect across all training
  frames_per_batch: 2048      # frames to collect before each training epoch (data collection iteration)
  max_frames_per_traj: 1000   # max steps per episode before truncation (env horizon)

# ── Training loop ──────────────────────────────────────────────────────
training:
  num_epochs: 10              # inner PPO optimisation epochs per batch
  sub_batch_size: 64          # mini-batch size inside each epoch
  max_grad_norm: 1.0
  eval_interval: 10           # evaluate every N collector iterations
  eval_rollout_steps: 1000    # steps to run during evaluation (deterministic policy, no training)
  save_interval: 50           # save checkpoint every N collector iterations
  checkpoint_dir: checkpoints

# ── Reproducibility ────────────────────────────────────────────────────
seed: 42

# ── Device ─────────────────────────────────────────────────────────────
device: cpu                   # device for collector/env (cpu | cuda | auto)

# ── Weights & Biases ───────────────────────────────────────────────────
wandb:
  enabled: true
  project: aamas-ppo
  entity: null                # set to your wandb team / username
  group: null
  name: null                  # auto-generated if null
  tags: []
  mode: online                # online | offline | disabled
  dir: logs/wandb             # local directory for wandb logs
