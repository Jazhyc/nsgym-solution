# ── FrozenLake config ────────────────────────────────────────────────────────
defaults:
  - agent: ppo
  - env: frozenlake
  - _self_               # values below override the defaults above

hydra:
  run:
    dir: logs/runs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: logs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

# ── Data collection ─────────────────────────────────────────────────────────
collector:
  num_envs: 24
  num_groups: 2
  total_frames: 1_000_000   # performance deteriorates with over-training?
  frames_per_batch: 2560
  max_frames_per_traj: 200  # FrozenLake-v1 episode cap

# ── CPU threading ────────────────────────────────────────────────────────────
num_threads: 4

# ── Training loop ────────────────────────────────────────────────────────────
training:
  num_epochs: 5
  sub_batch_size: 256
  max_grad_norm: 0.5
  target_kl: 0.02
  eval_ratio: 0.2            # evaluate every X% of total training frames (0.1 = every 10%)
  eval_rollout_steps: 200
  num_eval_episodes: 12      # FrozenLake is high-variance
  save_interval: 10000
  checkpoint_dir: checkpoints/frozenlake

# ── Reproducibility ──────────────────────────────────────────────────────────
seed: 42

# ── Device ───────────────────────────────────────────────────────────────────
device: cpu

# ── Agent overrides (on top of agent/ppo.yaml) ───────────────────────────────
agent:
  hidden_sizes: [64, 64]
  entropy_coeff: 0.01   # sparse rewards need exploration bonus to avoid early convergence
  lr: 5.0e-4
  lr_min: 1.0e-5

# ── Weights & Biases ─────────────────────────────────────────────────────────
wandb:
  enabled: true
  project: aamas-ppo-frozenlake
  entity: null
  group: null
  name: null
  tags: [frozenlake]
  mode: online
  dir: logs/wandb
