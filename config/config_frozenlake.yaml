# ── FrozenLake config ────────────────────────────────────────────────────────
defaults:
  - agent: ppo
  - env: frozenlake
  - _self_               # values below override the defaults above

hydra:
  run:
    dir: logs/runs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: logs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

# ── Data collection ─────────────────────────────────────────────────────────
collector:
  num_envs: 24
  num_groups: 2
  total_frames: 100_000   # performance deteriorates with over-training
  frames_per_batch: 512
  max_frames_per_traj: 200  # FrozenLake-v1 episode cap

# ── CPU threading ────────────────────────────────────────────────────────────
num_threads: 4

# ── Training loop ────────────────────────────────────────────────────────────
training:
  num_epochs: 10
  sub_batch_size: 64
  max_grad_norm: 0.5
  target_kl: 0.02
  eval_interval: 20          # evaluate often; runs are short
  eval_rollout_steps: 200
  num_eval_episodes: 20      # FrozenLake is high-variance; use more eval episodes
  save_interval: 200
  checkpoint_dir: checkpoints/frozenlake

# ── Reproducibility ──────────────────────────────────────────────────────────
seed: 42

# ── Device ───────────────────────────────────────────────────────────────────
device: cpu

# ── Agent overrides (on top of agent/ppo.yaml) ───────────────────────────────
agent:
  hidden_sizes: [64, 64]
  entropy_coeff: 0.01   # sparse rewards need exploration bonus to avoid early convergence
  lr: 5.0e-4
  lr_min: 1.0e-5

# ── Weights & Biases ─────────────────────────────────────────────────────────
wandb:
  enabled: true
  project: aamas-ppo
  entity: null
  group: null
  name: null
  tags: [frozenlake]
  mode: online
  dir: logs/wandb
