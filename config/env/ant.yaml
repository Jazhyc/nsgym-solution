# ── Ant environment (ns-gym wrapped) ────────────────────────────────────
id: Ant-v5
ns_wrapper: mujoco              # mujoco | classic_control | none
frame_skip: 1

# Observation / reward transforms applied by TorchRL
normalize_obs: true
normalize_obs_init_steps: 1000  # random steps for ObservationNorm stats
update_normalization_online: false  # if true, update stats during training; if false, freeze after init (more stable)
