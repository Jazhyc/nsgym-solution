# ── Top-level Hydra config ──────────────────────────────────────────────
defaults:
  - agent: ppo
  - env: ant
  - _self_

hydra:
  run:
    dir: logs/runs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: logs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

# ── Data collection ────────────────────────────────────────────────────
collector:
  num_envs: 24                # total parallel environments (num_groups * envs_per_group)
  num_groups: 2               # async collector groups: 1 collecting while 1 is trained on (max 1-step staleness)
  total_frames: 500_000_000  # 10_000_000     # total frames to collect across all training
  frames_per_batch: 2560      # frames to collect before each training epoch (increased for efficiency)
  max_frames_per_traj: 1000   # max steps per episode before truncation (env horizon)

# ── CPU threading ───────────────────────────────────────────────────────
# For small MLPs, PyTorch BLAS thread-launch overhead exceeds the benefit.
# 4-6 threads is often optimal on 12c/24t CPUs. Set to 0 to use PyTorch default.
num_threads: 4

# ── Training loop ──────────────────────────────────────────────────────
training:
  num_epochs: 5             # inner PPO optimisation epochs per batch (KL stopping prevents instability)
  sub_batch_size: 256           # mini-batch size inside each epoch
  max_grad_norm: 1
  target_kl: 0.02           # stop epochs early if mean KL exceeds this; null to disable; 0.015 SB3 default
  eval_ratio: 0.2             # evaluate every X% of total training frames (0.20 = every 20%)
  eval_rollout_steps: 1000    # max steps per eval episode (vectorized over num_eval_episodes envs)
  num_eval_episodes: 8        # max parallel eval envs per shard (controls CPU usage)
                              # env.plr.num_eval_configs controls coverage (can be larger)
  save_interval: 10000           # save checkpoint every N collector iterations
  checkpoint_dir: checkpoints/ant
  
  # Note: The checkpoint directory has been changed to 'checkpoints' for Ant training.

# ── Reproducibility ────────────────────────────────────────────────────
seed: 42

# ── Device ─────────────────────────────────────────────────────────────
device: cpu                   # device for collector/env (cpu | cuda | auto)

# ── Weights & Biases ───────────────────────────────────────────────────
wandb:
  enabled: true
  project: aamas-ppo-ant
  entity: null                # set to your wandb team / username
  group: null
  name: null                  # auto-generated if null
  tags: []
  mode: online                # online | offline | disabled
  dir: logs/wandb             # local directory for wandb logs

cbp:
  enabled: false
  reset_rate: 0.01
  maturity_threshold: 50
  utility_decay: 0.05
  reset_init: uniform   # uniform | normal | constant
  momentum: 0.9

# Number of samples to use for esitmating (diagonal) fisher information
# matrix
fisher_samples: 2000
