# ── PPO agent hyper-parameters ──────────────────────────────────────────
lr: 3.0e-4                    # SB3 default for MuJoCo PPO
lr_min: 0.0
gamma: 0.99
eps_clip: 1.0e-5
gae_lambda: 0.95
clip_epsilon: 0.2
entropy_coeff: 0.0           # SB3 default for MuJoCo (no entropy bonus)
critic_coeff: 0.5            # SB3 default vf_coef
loss_critic_type: smooth_l1          # smooth_l1 clips large TD errors
optimizer: adamw              # optimizer: adamw | rmsprop

# RPO (Robust Policy Optimization) — changed distribution
rpo_alpha: 0               # scale perturbation: σ' = σ + Uniform(0, α). 0 = disabled.

# Discovered Policy Optimization (Lu et al., NeurIPS 2022)
use_disco: false              # replace PPO clip objective with discovered surrogate
disco_alpha: 2             # soft-clip threshold for A >= 0 branch
disco_beta: 0.6              # soft-clip threshold for A < 0 branch

# ── Network architecture ─────────────────────────────────────────────────
hidden_sizes: [256, 256]
activation: Tanh              # any torch.nn activation class name
share_trunk: false             # share hidden layers between actor and critic (saves ~1 trunk forward per mini-batch)
network_device: cpu           # device for neural networks (cpu | cuda | auto)
use_layer_norm: true         # add LayerNorm after each hidden layer activation

# ── Performance optimizations ──────────────────────────────────────────
compile: true                # use torch.compile for faster training
compile_mode: default         # 'reduce-overhead' uses CUDA graphs (no benefit on CPU); 'default' is best for CPU
dtype: float32               # network dtype: float32 | float16 | bfloat16 (float16/bfloat16 only beneficial on GPU)