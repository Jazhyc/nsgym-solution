# ── PPO agent hyper-parameters ──────────────────────────────────────────
lr: 3.0e-4
lr_min: 0.0
gamma: 0.99
gae_lambda: 0.95
clip_epsilon: 0.2
entropy_coeff: 1.0e-4
critic_coeff: 1.0
loss_critic_type: smooth_l1   # smooth_l1 | l2
optimizer: rmsprop              # optimizer: adamw | rmsprop | muon | muon_adamw

# ── Network architecture ───────────────────────────────────────────────
hidden_sizes: [64, 64]
activation: Tanh              # any torch.nn activation class name
network_device: cpu           # device for neural networks (cpu | cuda | auto)

# ── Performance optimizations ──────────────────────────────────────────
compile: true                # use torch.compile for faster training (PyTorch 2.0+)
compile_mode: reduce-overhead  # reduce-overhead is better for CPU and small models
dtype: float32               # network dtype: float32 | float16 | bfloat16 (float16/bfloat16 only beneficial on GPU)